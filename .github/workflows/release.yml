name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify npm authentication
        run: |
          echo "Authenticated npm user:"
          npm whoami
          echo "Package maintainers:"
          npm owner ls vue3-smooth-scrollbar

      - name: Check for pending changesets
        id: pending
        run: |
          count=$(find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Open version packages pull request
        if: steps.pending.outputs.count != '0'
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: exit 0
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: steps.pending.outputs.count == '0'
        id: publish
        run: |
          VERSION=$(node -p "require('./package.json').version")

          if npm view "vue3-smooth-scrollbar@${VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "vue3-smooth-scrollbar@${VERSION} is already on npm"
            exit 0
          fi

          bun run build
          npm publish --access public

          echo "already_published=false" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.publish.outputs.already_published == 'false'
        run: |
          VERSION="${{ steps.publish.outputs.version }}"
          awk "/^## ${VERSION}$/,/^## / { if (!/^## / || \$0 == \"## ${VERSION}\") print }" CHANGELOG.md > "/tmp/release-notes.md"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file "/tmp/release-notes.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
